# ============================================================
# Конфигурация Nginx для Laravel
# ============================================================
# Nginx работает как "фронтендовый" сервер:
#   1. Статические файлы (CSS, JS, изображения) отдаёт сам
#   2. PHP-запросы (.php файлы) проксирует на PHP-FPM (контейнер app)
#
# Схема запроса:
#   Браузер → Nginx (:80) → /index.php → PHP-FPM (app:9000) → Laravel

server {
    # Слушаем 80 порт (стандартный HTTP)
    listen 80;

    # server_name — имя сервера. _ означает "принимать любой хост"
    server_name _;

    # root — корневая папка. Laravel хранит публичные файлы в /public
    # Nginx ищет файлы здесь
    root /var/www/public;

    # index — файл по умолчанию (при запросе /  → /index.php)
    index index.php index.html;

    # charset — кодировка ответа
    charset utf-8;

    # ============================================================
    # Заголовки безопасности
    # ============================================================
    add_header X-Frame-Options "SAMEORIGIN";           # Запрет iframe с других сайтов
    add_header X-XSS-Protection "1; mode=block";       # Защита от XSS
    add_header X-Content-Type-Options "nosniff";        # Запрет MIME-sniffing

    # ============================================================
    # Основной блок location
    # ============================================================
    location / {
        # try_files — пробуем найти файл в таком порядке:
        # $uri       — точный путь (например /css/app.css)
        # $uri/      — директория (например /about/)
        # /index.php?$query_string — если не нашли → отдаём index.php
        #
        # Это ключевая настройка для SPA/Laravel:
        # /catalog/ofisnoye-po → файла нет → /index.php → Laravel/Vue Router
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ============================================================
    # Игнорируем favicon и robots.txt (не логируем 404)
    # ============================================================
    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }

    location = /robots.txt {
        access_log off;
        log_not_found off;
    }

    # ============================================================
    # Обработка PHP-файлов (FastCGI → PHP-FPM)
    # ============================================================
    location ~ \.php$ {
        # fastcgi_pass — адрес PHP-FPM сервера
        # app:9000 — контейнер app, порт 9000 (порт PHP-FPM по умолчанию)
        # Docker DNS резолвит 'app' в IP контейнера asoft_app
        fastcgi_pass app:9000;

        # SCRIPT_FILENAME — полный путь к PHP-файлу
        # $realpath_root — реальный путь к root директории
        # $fastcgi_script_name — имя скрипта из URL
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;

        # include fastcgi_params — стандартные параметры FastCGI
        # (REQUEST_METHOD, QUERY_STRING, SERVER_NAME и др.)
        include fastcgi_params;

        # fastcgi_index — файл по умолчанию для FastCGI
        fastcgi_index index.php;

        # Таймауты (для долгих операций: import данных, отчёты)
        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
    }

    # ============================================================
    # Запрет доступа к скрытым файлам (.env, .git и т.д.)
    # ============================================================
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # ============================================================
    # Логи
    # ============================================================
    # Логи пишутся в /var/log/nginx/ — мы монтируем это в docker/nginx/logs/
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;
}
