; ============================================================
; Настройки PHP для разработки
; Этот файл монтируется в /usr/local/etc/php/conf.d/local.ini
; и переопределяет дефолтные настройки PHP
; ============================================================

; Максимальный размер загружаемого файла (изображения товаров)
upload_max_filesize = 64M
post_max_size = 64M

; Максимальное время выполнения скрипта в секундах
max_execution_time = 300

; Максимальное время ожидания входных данных
max_input_time = 300

; Максимум памяти для одного PHP-процесса
memory_limit = 512M

; Показывать ошибки в браузере (только для разработки!)
; В продакшене: display_errors = Off
display_errors = On
display_startup_errors = On
error_reporting = E_ALL

; Логировать ошибки
log_errors = On

; Часовой пояс для date() функций
date.timezone = Asia/Almaty
