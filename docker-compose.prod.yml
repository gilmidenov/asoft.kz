services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: asoft_app
    restart: unless-stopped
    working_dir: /var/www
    env_file:
      - .env
    volumes:
      - .:/var/www
      - ./docker/php/prod.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - asoft_network
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      bash -c "chown -R www-data:www-data /var/www/storage /var/www/bootstrap/cache
      && chmod -R 775 /var/www/storage /var/www/bootstrap/cache
      && php-fpm"
    deploy:
      resources:
        limits:
          memory: 512M

  nginx:
    image: nginx:alpine
    container_name: asoft_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - .:/var/www
      - ./docker/nginx/prod.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - asoft_network
    depends_on:
      - app
    deploy:
      resources:
        limits:
          memory: 128M

  postgres:
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:5432:5432"
    container_name: asoft_postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - asoft_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

networks:
  asoft_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
